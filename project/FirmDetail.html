<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { background: #F8F9FA; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    color: #2B2D30;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  .font-serif-display { font-family: 'Crimson Pro', Georgia, serif; }
  .tabular { font-variant-numeric: tabular-nums; }

  /* ---- Search input ----------------------------------------- */
  .ff-search {
    width: 240px;
    transition: width 0.2s ease, border-color 0.2s ease;
  }
  .ff-search:focus {
    width: 320px;
    outline: 2px solid #4A5E7C;
    outline-offset: 2px;
    border-color: #4A5E7C;
  }
  .ff-search::placeholder { color: #5A5C60; }

  /* ---- Ghost button (charcoal) ------------------------------ */
  .ff-ghost {
    background: transparent;
    color: #2B2D30;
    border: 1px solid #D8D9DA;
    border-radius: 2px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  .ff-ghost:hover { background: #2B2D30; color: #F8F9FA; border-color: #2B2D30; }
  .ff-ghost:focus-visible { outline: 2px solid #E63946; outline-offset: 2px; }

  /* ---- Ghost button (slate blue, for Edit notes / Add partner) */
  .ff-ghost-slate {
    background: transparent;
    color: #4A5E7C;
    border: 1px solid #4A5E7C;
    border-radius: 2px;
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 600;
    transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  .ff-ghost-slate:hover { background: #4A5E7C; color: #F8F9FA; }
  .ff-ghost-slate:focus-visible { outline: 2px solid #E63946; outline-offset: 2px; }

  /* ---- Nav links --------------------------------------------- */
  .ff-nav-link {
    font-size: 14px;
    font-weight: 600;
    color: #4A5E7C;
    padding: 4px 0;
    border-bottom: 2px solid transparent;
    transition: color 0.2s ease, border-color 0.2s ease;
  }
  .ff-nav-link:hover { color: #2B2D30; }
  .ff-nav-link.is-active { border-bottom-color: #4A5E7C; }

  /* ---- Links ------------------------------------------------- */
  .ff-link {
    color: #4A5E7C;
    border-bottom: 1px solid transparent;
    transition: color 0.2s ease, border-color 0.2s ease;
  }
  .ff-link:hover { color: #2B2D30; border-bottom-color: currentColor; }

  /* ---- Partner card hover ----------------------------------- */
  .ff-partner-card {
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .ff-partner-card:hover {
    border-color: #4A5E7C;
    background: rgba(74, 94, 124, 0.04);
  }

  /* ---- Partners grid: 2-up desktop, 1-up tablet/mobile ------ */
  .ff-partners-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    row-gap: 20px;
  }
  @media (max-width: 1023px) {
    .ff-partners-grid { grid-template-columns: 1fr; }
  }

  /* ---- Timeline entry button reset -------------------------- */
  .ff-timeline-trigger {
    width: 100%;
    text-align: left;
    background: transparent;
    border: 0;
    padding: 0;
    cursor: pointer;
    font-family: inherit;
    color: inherit;
  }
  .ff-timeline-trigger:focus-visible {
    outline: 2px solid #E63946;
    outline-offset: 4px;
    border-radius: 2px;
  }
  .ff-timeline-card {
    transition: background 0.2s ease, border-color 0.2s ease;
  }
  .ff-timeline-trigger:hover .ff-timeline-card {
    background: rgba(74, 94, 124, 0.04);
    border-color: #4A5E7C;
  }
</style>
</head>

/* ───────────────────────────── PRIMITIVES ───────────────────────────── */

function StatusPill({ status }) {
  const map = {
    warm:     { bg: "#4A5E7C",                 fg: "#F8F9FA", label: "warm" },
    warming:  { bg: "rgba(74, 94, 124, 0.4)",  fg: "#F8F9FA", label: "warming" },

    dormant:  { bg: "#9CA3AF",                 fg: "#F8F9FA", label: "dormant" },
    overdue:  { bg: "#E63946",                 fg: "#F8F9FA", label: "overdue" },
    due_soon: { bg: "#4A5E7C",                 fg: "#F8F9FA", label: "due_soon" },
  };
  const s = map[status] || map.cold;
  return (
    <span
      className="inline-flex items-center"
      style={{
        background: s.bg,
        color: s.fg,
        fontSize: "12px",
        fontWeight: 600,
        padding: "4px 12px",
        borderRadius: "999px",
        lineHeight: 1,
        letterSpacing: "0.01em",
        whiteSpace: "nowrap",
      }}
    >
      {s.label}
    </span>
  );
}

/* ───────────────────────────── TIMELINE ENTRY ───────────────────────────── */

function TimelineEntry({ entry, isLast }) {
  const [open, setOpen] = useState(false);

  const hasDetails =
    Boolean(entry.valueGiven) || Boolean(entry.valueReceived) || Boolean(entry.followUp);

  return (
    <li
      className="relative"
      style={{
        paddingLeft: "56px",
        paddingBottom: isLast ? 0 : "32px",
      }}
    >
      {/* Vertical line — sits behind the icon, runs the full height of this entry */}
      {!isLast && (
        <span
          aria-hidden="true"
          style={{
            position: "absolute",
            left: "15.5px",
            top: "32px",
            bottom: 0,
            width: "1px",
            background: "#D8D9DA",
          }}
        />
      )}

      {/* Channel icon */}
      <span
        aria-hidden="true"
        style={{
          position: "absolute",
          left: 0,
          top: 0,
          width: "32px",
          height: "32px",
          borderRadius: "999px",
          background: "#4A5E7C",
          display: "inline-flex",
          alignItems: "center",
          justifyContent: "center",
        }}
      >
        <ChannelIcon name={entry.channel} size={16} color="#F8F9FA" />
      </span>

      {/* Content card — clickable */}
      <button
        type="button"
        className="ff-timeline-trigger"
        aria-expanded={open}
        onClick={() => hasDetails && setOpen((v) => !v)}
        style={{ cursor: hasDetails ? "pointer" : "default" }}
      >
        <div
          className="ff-timeline-card"
          style={{
            background: "#FFFFFF",
            border: "1px solid #D8D9DA",
            borderRadius: "4px",
            padding: "16px 20px",
          }}
        >
          <div className="flex items-baseline justify-between gap-3 flex-wrap">
            <div className="flex items-baseline gap-3 flex-wrap">
              <span
                className="tabular"
                style={{ color: "#4A5E7C", fontSize: "14px", fontWeight: 600, letterSpacing: "0.01em" }}
              >
                {entry.date}
              </span>
              <span style={{ color: "#D8D9DA" }} aria-hidden="true">·</span>
              <span style={{ color: "#2B2D30", fontSize: "16px", fontWeight: 600 }}>
                {entry.partner}
              </span>
              <span style={{ color: "#D8D9DA" }} aria-hidden="true">·</span>
              <span
                className="eyebrow"
                style={{
                  fontSize: "11px",
                  letterSpacing: "0.08em",
                  textTransform: "uppercase",
                  color: "#7D8E9E",
                  fontWeight: 500,
                }}
              >
                {CHANNEL_LABEL[entry.channel] || "Other"}
              </span>
            </div>

            {hasDetails && (
              <span
                aria-hidden="true"
                style={{ color: "#4A5E7C", display: "inline-flex", alignItems: "center" }}
              >
                <ChevronIcon open={open} />
              </span>
            )}
          </div>

          <p
            style={{
              color: "#2B2D30",
              fontSize: "14px",
              lineHeight: 1.5,
              margin: "8px 0 0",
              maxWidth: "none",
            }}
          >
            {entry.summary}
          </p>

          {open && hasDetails && (
            <div
              style={{
                marginTop: "16px",
                paddingTop: "16px",
                borderTop: "1px solid #D8D9DA",
                display: "grid",
                gridTemplateColumns: "auto 1fr",
                columnGap: "20px",
                rowGap: "10px",
              }}
            >
              {entry.valueGiven && (
                <React.Fragment>
                  <span
                    className="eyebrow"
                    style={{
                      fontSize: "11px",
                      letterSpacing: "0.08em",
                      textTransform: "uppercase",
                      color: "#7D8E9E",
                      fontWeight: 500,
                      whiteSpace: "nowrap",
                      paddingTop: "1px",
                    }}
                  >
                    Value given →
                  </span>
                  <span style={{ color: "#2B2D30", fontSize: "14px", lineHeight: 1.5 }}>
                    {entry.valueGiven}
                  </span>
                </React.Fragment>
              )}
              {entry.valueReceived && (
                <React.Fragment>
                  <span
                    className="eyebrow"
                    style={{
                      fontSize: "11px",
                      letterSpacing: "0.08em",
                      textTransform: "uppercase",
                      color: "#7D8E9E",
                      fontWeight: 500,
                      whiteSpace: "nowrap",
                      paddingTop: "1px",
                    }}
                  >
                    ← Value received
                  </span>
                  <span style={{ color: "#2B2D30", fontSize: "14px", lineHeight: 1.5 }}>
                    {entry.valueReceived}
                  </span>
                </React.Fragment>
              )}
              {entry.followUp && (
                <React.Fragment>
                  <span
                    className="eyebrow"
                    style={{
                      fontSize: "11px",
                      letterSpacing: "0.08em",
                      textTransform: "uppercase",
                      color: "#E63946",
                      fontWeight: 600,
                      whiteSpace: "nowrap",
                      paddingTop: "1px",
                    }}
                  >
                    Follow-up
                  </span>
                  <span style={{ color: "#2B2D30", fontSize: "14px", lineHeight: 1.5, fontWeight: 500 }}>
                    {entry.followUp}
                  </span>
                </React.Fragment>
              )}
            </div>
          )}
        </div>
      </button>
    </li>
  );
}

/* ───────────────────────────── TIMELINE SECTION ─────────────────────────── */

function TimelineSection() {
  return (
    <section data-screen-label="Contact history" style={{ marginTop: "64px" }}>
      <header style={{ marginBottom: "24px" }}>
        <h2
          className="font-serif-display"
          style={{
            color: "#4A5E7C",
            fontSize: "28px",
            fontWeight: 700,
            lineHeight: 1.1,
            margin: 0,
          }}
        >
          Contact history
        </h2>
        <p
          className="tabular"
          style={{
            color: "#2B2D30",
            fontSize: "14px",
            margin: "4px 0 0",
            opacity: 0.75,
          }}
        >
          Last 12 months · 11 contacts
        </p>
      </header>

      <ol
        className="flex flex-col"
        style={{ listStyle: "none", margin: 0, padding: 0 }}
      >
        {TIMELINE.map((e, i) => (
          <TimelineEntry key={e.id} entry={e} isLast={i === TIMELINE.length - 1} />
        ))}
      </ol>
    </section>
  );
}

/* ───────────────────────────── FOOTER ───────────────────────────── */

function Footer() {
  return (
    <footer style={{ marginTop: "64px", paddingTop: "16px", borderTop: "1px solid #D8D9DA" }}>
      <p
        className="tabular"
        style={{
          margin: 0,
          color: "#2B2D30",
          fontSize: "12px",
          opacity: 0.85,
        }}
      >
        Last backup: 11 May 2026 03:00 UTC · Artemide v0.1
      </p>
    </footer>
  );
}

/* ───────────────────────────── APP ───────────────────────────── */

function App() {
  return (
    <div className="min-h-screen w-full bg-[#F8F9FA]" data-screen-label="Firm — TML Partners">
      <Header />
      <FirmHeader />

      <main className="max-w-[1280px] mx-auto" style={{ padding: "32px" }}>
        <div
          className="grid"
          style={{
            gridTemplateColumns: "minmax(0, 2fr) minmax(0, 1fr)",
            gap: "32px",
            alignItems: "start",
          }}
        >
          <PartnersSection />
          <QuickStats />
        </div>

        <TimelineSection />

        <Footer />
      </main>

      {/* Responsive: stack the two columns under 1024px */}
      <style>{`
        @media (max-width: 1023px) {
          main > .grid { grid-template-columns: 1fr !important; }
          aside { position: static !important; }
        }
        @media (max-width: 640px) {
          main { padding: 24px 16px !important; }
        }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
