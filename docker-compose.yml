services:
  artemide:
    build: .
    restart: unless-stopped
    env_file: .env
    # Loopback-only publish — ingress is via the host's shared Traefik
    # (see /docker/traefik/dynamic/artemide.yml), same pattern as the
    # other self-hosted apps. Not publicly reachable on its own.
    ports:
      - "127.0.0.1:47600:8000"
    volumes:
      - artemide-data:/data
    networks:
      - n8n_default

networks:
  n8n_default:
    external: true

volumes:
  artemide-data:
